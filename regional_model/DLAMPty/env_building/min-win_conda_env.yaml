name: ty
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - pip
  - python<3.12
  - pytorch
  - torchvision
  - torchaudio
  - pytorch-cuda=12.4
  - lightning
  - cudnn=9
  - timm
  - pysolar
  - metpy
  - onnx
  - xarray
  - bottleneck
  - netcdf4
  - tqdm
  - cmaps
  - pandas
  - matplotlib
  - matplotlib-inline
  - contourpy
  - cartopy
  - xESMF
